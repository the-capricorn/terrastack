formatter: "markdown table"

output:
  file: "README.md"
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

settings:
  anchor: true
  color: true
  description: true
  escape: true
  indent: 2
  required: true
  sensitive: true
  type: true

sections:
  show:
    - requirements
    - providers
    - inputs
    - outputs
